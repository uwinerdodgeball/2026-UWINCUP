<script>
        const { createApp, ref, onMounted } = Vue;
        const TEAM_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5GX2RO0zfoMMr6Sm3zOhmXm1ZvLiHCLype4XVI6sj6RL7VdLDFtHd-3zpwPmE8x2KGaSFysEYWYFB/pub?output=csv';
        const MATCH_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSP1qGTwLgLVQhL-uXLdNnvAOVwYSUj5S1qmNMoCCuefRSfstoQQW9lPR80BNok9_pYjvHu90SyG96t/pub?output=csv';

        createApp({
            setup() {
                const currentTab = ref('rank');
                const matchGroup = ref('A'); 
                const loading = ref(true);
                const teams = ref([]);
                const matches = ref([]);
                const lastUpdated = ref('--:--:--');

                // 強制跳過快取的抓取函數
                const loadCSV = (url) => {
                    const cacheBuster = `&t=${new Date().getTime()}`; // 產生隨機數列
                    return new Promise((resolve, reject) => {
                        Papa.parse(url + cacheBuster, { 
                            download: true, 
                            header: true, 
                            skipEmptyLines: true, 
                            complete: (res) => resolve(res.data), 
                            error: (err) => reject(err) 
                        });
                    });
                };

                const fetchData = async () => {
                    loading.value = true;
                    try {
                        const rawTeams = await loadCSV(TEAM_CSV_URL);
                        const rawMatches = await loadCSV(MATCH_CSV_URL);
                        const processedTeams = rawTeams.map(t => ({ id: parseInt(String(t.id).trim()), group: String(t.group).trim(), name: String(t.name).trim(), wins: 0, draws: 0, losses: 0, sw: 0, sl: 0 }));
                        rawMatches.forEach(m => {
                            const s1 = parseInt(m.score1) || 0; const s2 = parseInt(m.score2) || 0;
                            const t1Id = parseInt(m.t1Id); const t2Id = parseInt(m.t2Id);
                            if (isNaN(t1Id) || isNaN(t2Id)) return;
                            if (s1 === 0 && s2 === 0) return;
                            const t1 = processedTeams.find(t => t.id === t1Id);
                            const t2 = processedTeams.find(t => t.id === t2Id);
                            if (t1 && t2) { t1.sw += s1; t1.sl += s2; t2.sw += s2; t2.sl += s1; if (s1 > s2) { t1.wins++; t2.losses++; } else if (s2 > s1) { t2.wins++; t1.losses++; } else { t1.draws++; t2.draws++; } }
                        });
                        teams.value = processedTeams;
                        matches.value = rawMatches;
                        lastUpdated.value = new Date().toLocaleTimeString();
                    } catch (e) { console.error(e); }
                    loading.value = false;
                };

                const getTeamName = (id) => teams.value.find(t => t.id === parseInt(id))?.name || '??';
                const sortedGroup = (g) => [...teams.value].filter(t => t.group === g).sort((a, b) => (b.wins*3+b.draws) - (a.wins*3+a.draws) || b.sw - a.sw || a.sl - b.sl);
                onMounted(() => { fetchData(); setInterval(fetchData, 30000); });
                return { currentTab, matchGroup, loading, lastUpdated, teams, matches, getTeamName, sortedGroup };
            }
        }).mount('#app');
    </script>
